<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EBC Comfort — Offline</title>
<style>
  :root { color-scheme: light dark; }
  body { margin: 0; min-height: 100vh; display: grid; place-items: center;
    font-family: 'Manrope', system-ui, sans-serif; background: #fbfaf9; color: #1c1a18; text-align: center; padding: 24px; }
  @media (prefers-color-scheme: dark) { body { background: #14110d; color: #f0eee9; } }
  .dot { width: 56px; height: 56px; border-radius: 50%; background: #8b7355; margin: 0 0 20px; }
  h1 { font-size: 22px; font-weight: 800; margin: 0 0 8px; }
  p { color: #6b665f; font-size: 15px; max-width: 320px; margin: 0 0 20px; line-height: 1.5; }
  button { font: inherit; padding: 10px 22px; border-radius: 999px; border: 1px solid #8b7355;
    background: #8b7355; color: #fff; cursor: pointer; }
</style>
</head>
<body>
  <div>
    <div class="dot"></div>
    <h1>Nincs internetkapcsolat</h1>
    <p>Úgy tűnik, offline vagy. Az EBC Comfort újratölt, amint visszatér a hálózat.</p>
    <button onclick="location.reload()">Újratöltés</button>
  </div>
</body>
</html>
